<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematik Platformu</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeece6;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#9a9890;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-text:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-text:#633806;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
    --text:#e8e6de;--text2:#9a9890;--text3:#6a6864;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --blue:#378ADD;--blue-bg:#042C53;--blue-text:#B5D4F4;
    --green:#639922;--green-bg:#173404;--green-text:#C0DD97;
    --red:#E24B4A;--red-bg:#501313;--red-text:#F7C1C1;
    --amber:#EF9F27;--amber-bg:#412402;--amber-text:#FAC775;
    --purple:#7F77DD;--purple-bg:#26215C;--purple-text:#CECBF6;
    --teal:#1D9E75;--teal-bg:#04342C;--teal-text:#9FE1CB;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:1.5rem 1rem}
.ekran{display:none}.ekran.aktif{display:block}
.kart{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.btn{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:0.5rem 1rem;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;transition:background .15s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#E6F1FB;border-color:var(--blue)}
.btn-primary:hover{opacity:.9}
.btn-block{width:100%;padding:.65rem 1rem;text-align:center}
.nav-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.nav-baslik{font-size:15px;font-weight:500;flex:1}
.ilerleme-bar-dis{background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;margin:6px 0}
.ilerleme-bar-ic{height:100%;background:var(--blue);border-radius:4px;transition:width .4s}
.ders-kart{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.ders-kart:hover{border-color:var(--border2)}
.ders-kart.tamamlandi{border-color:var(--green)}
.ders-kart.kilitli{opacity:.5;cursor:default}
.ders-no{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
/* Anlatım */
.bolum{margin-bottom:1.5rem}
.bolum h3{font-size:15px;font-weight:500;margin-bottom:8px}
.bolum p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:6px}
.bilgi-kutu{background:var(--bg2);border-radius:var(--r);padding:.85rem 1rem;font-size:13px;line-height:1.65;margin:10px 0}
.adim-kutu{border-left:3px solid var(--blue);padding:.75rem 1rem;background:var(--blue-bg);border-radius:0 var(--r) var(--r) 0;margin:8px 0;font-size:13px;color:var(--blue-text)}
.ornek-kutu{border-left:3px solid var(--teal);padding:.75rem 1rem;background:var(--teal-bg);border-radius:0 var(--r) var(--r) 0;margin:8px 0;font-size:13px;color:var(--teal-text)}
/* Quiz */
.secenek-btn{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:.65rem 1rem;font-size:14px;cursor:pointer;text-align:left;color:var(--text);transition:all .15s;margin-bottom:8px;font-family:inherit}
.secenek-btn:hover:not(:disabled){border-color:var(--blue);background:var(--bg2)}
.secenek-btn.dogru{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--green-text)}
.secenek-btn.yanlis{border-color:var(--red)!important;background:var(--red-bg)!important;color:var(--red-text)}
.cozum-kutu{border-radius:var(--r);padding:1rem;margin-top:12px;font-size:13px;line-height:1.8;display:none}
.cozum-kutu.dogru-cozum{background:var(--bg2);border-left:3px solid var(--green);color:var(--text);border-radius:0 var(--r) var(--r) 0}
.cozum-kutu.yanlis-cozum{background:var(--bg2);border-left:3px solid var(--red);color:var(--text);border-radius:0 var(--r) var(--r) 0}
.cozum-adim{background:var(--bg);border-radius:var(--r);padding:.5rem .75rem;margin-top:6px;font-size:13px;border:0.5px solid var(--border)}
.quiz-ilerleme{display:flex;gap:5px;margin-bottom:12px}
.quiz-nokta{width:8px;height:8px;border-radius:50%;background:var(--border2)}
.quiz-nokta.aktif{background:var(--blue)}
.quiz-nokta.dogru-nokta{background:var(--green)}
.quiz-nokta.yanlis-nokta{background:var(--red)}
.istat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.istat-kart{background:var(--bg2);border-radius:var(--r);padding:.85rem 1rem;text-align:center}
.istat-sayi{font-size:22px;font-weight:500;margin-bottom:2px}
.istat-label{font-size:12px;color:var(--text2)}
.rozet-kazanildi{background:var(--green-bg);color:var(--green-text);border-radius:var(--r);padding:4px 10px;font-size:12px;font-weight:500;display:inline-block}
.rozet-kilitli{background:var(--bg2);color:var(--text3);border-radius:var(--r);padding:4px 10px;font-size:12px;display:inline-block}
.sonuc-daire{width:80px;height:80px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1rem}
input[type=text]{width:100%;padding:.65rem 1rem;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;outline:none}
input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
input[type=range]{width:100%;accent-color:var(--blue)}
.badge{display:inline-flex;align-items:center;border-radius:var(--r);padding:3px 8px;font-size:12px;font-weight:500}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.yukleniyor{text-align:center;padding:2rem;color:var(--text2);font-size:13px}
</style>
</head>
<body>
<div class="container">

<!-- Giriş -->
<div id="ekran-giris" class="ekran aktif">
  <div class="kart" style="margin-top:3rem;max-width:420px;margin-left:auto;margin-right:auto">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:36px;margin-bottom:8px">📐</div>
      <h1 style="font-size:20px;font-weight:500;margin-bottom:4px">Matematik Platformu</h1>
      <p style="font-size:13px;color:var(--text2)">Sıfırdan ileri seviyeye</p>
    </div>
    <div id="giris-hata" style="display:none;background:var(--red-bg);color:var(--red-text);border-radius:var(--r);padding:.65rem 1rem;font-size:13px;margin-bottom:10px"></div>
    <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:6px">Adın ne?</label>
    <input type="text" id="isim-input" placeholder="Adını yaz..." maxlength="30" style="margin-bottom:12px" onkeydown="if(event.key==='Enter')girisYap()">
    <button class="btn btn-primary btn-block" onclick="girisYap()">Başla →</button>
  </div>
</div>

<!-- Ana sayfa -->
<div id="ekran-anasayfa" class="ekran">
  <div class="kart">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <div>
        <div style="font-size:18px;font-weight:500">Matematik Platformu</div>
        <div style="font-size:13px;color:var(--text2)">Hoş geldin, <span id="hosgeldin" style="color:var(--blue);font-weight:500"></span>!</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="ekranGoster('ekran-istatistik')">İstatistikler</button>
        <button class="btn" onclick="cikisYap()" style="color:var(--text3)">Çıkış</button>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px">
      <span>Genel ilerleme</span><span id="genel-pct">0%</span>
    </div>
    <div class="ilerleme-bar-dis"><div class="ilerleme-bar-ic" id="genel-bar" style="width:0%"></div></div>
  </div>
  <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px;letter-spacing:.05em">AŞAMA 1 — SAYILAR</div>
  <div id="ders-listesi"></div>
  <div id="yukleniyor" class="yukleniyor" style="display:none">Yükleniyor...</div>
  <p style="font-size:12px;color:var(--text3);text-align:center;margin-top:1rem">Daha fazla ders yakında eklenecek</p>
</div>

<!-- Ders (anlatım) -->
<div id="ekran-ders" class="ekran">
  <div class="nav-bar">
    <button class="btn" onclick="ekranGoster('ekran-anasayfa')">← Geri</button>
    <div class="nav-baslik" id="ders-nav-baslik"></div>
  </div>
  <div id="ders-icerik"></div>
  <button class="btn btn-primary btn-block" onclick="quizBaslat()" style="margin-top:.5rem">Quize Geç →</button>
</div>

<!-- Quiz -->
<div id="ekran-quiz" class="ekran">
  <div class="nav-bar">
    <button class="btn" onclick="ekranGoster('ekran-anasayfa')">← Çık</button>
    <div class="nav-baslik" id="quiz-nav-baslik"></div>
  </div>
  <div id="quiz-icerik"></div>
</div>

<!-- Sonuç -->
<div id="ekran-sonuc" class="ekran">
  <div class="kart" style="text-align:center;padding:2rem 1.25rem">
    <div class="sonuc-daire" id="sonuc-daire">
      <div style="font-size:22px;font-weight:500" id="sonuc-sayi"></div>
      <div style="font-size:11px" id="sonuc-alt"></div>
    </div>
    <div style="font-size:16px;font-weight:500;margin-bottom:6px" id="sonuc-baslik"></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1.25rem" id="sonuc-metin"></p>
    <div id="sonuc-rozet" style="margin-bottom:1.25rem"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="ekranGoster('ekran-anasayfa')">Ana Sayfa</button>
      <button class="btn btn-primary" id="sonraki-btn">Sonraki Ders →</button>
    </div>
  </div>
</div>

<!-- İstatistik -->
<div id="ekran-istatistik" class="ekran">
  <div class="nav-bar">
    <button class="btn" onclick="ekranGoster('ekran-anasayfa')">← Geri</button>
    <div class="nav-baslik">İstatistikler</div>
  </div>
  <div class="istat-grid">
    <div class="istat-kart"><div class="istat-sayi" id="is-tam" style="color:var(--blue)">0</div><div class="istat-label">Tamamlanan</div></div>
    <div class="istat-kart"><div class="istat-sayi" id="is-dogru" style="color:var(--green)">0</div><div class="istat-label">Doğru cevap</div></div>
    <div class="istat-kart"><div class="istat-sayi" id="is-rozet" style="color:var(--amber)">0</div><div class="istat-label">Rozet</div></div>
  </div>
  <div class="kart">
    <div style="font-size:14px;font-weight:500;margin-bottom:12px">Rozetler</div>
    <div id="rozet-listesi"></div>
  </div>
</div>

</div>

      '<div style="display:flex;gap:16px;align-items:center;margin:1rem 0;flex-wrap:wrap">'+

        '<div style="flex:1;min-width:180px"><div class="bilgi-kutu" id="pizza-acik">Pizza bütün hâlde. Tıklayınca dilimlenecek ve kesri göreceksin.</div></div>'+

    '<div class="bolum">'+
      '<h3>Pay ve payda</h3>'+
      '<p>Bir kesirde iki sayı vardır:</p>'+

          '<div><span style="color:#185FA5;font-weight:500">8 → PAYDA</span>: Bütün kaç parçaya bölündü</div>'+
          '<div style="margin-top:6px;color:var(--text2)">Okunuşu: "sekizde üç"</div>'+
        '</div>'+
      '</div>'+
      '<div class="adim-kutu">Kural: Payda ne kadar büyürse, her parça o kadar küçülür.<br>1/2 > 1/4 > 1/8 — payda büyüdükçe parça küçülür!</div>'+

    '<div class="bolum">'+
      '<h3>Gerçek hayat örnekleri</h3>'+
      '<div class="ornek-kutu">🕐 3/4 saat = 45 dakika (1 saatin dörtte üçü)</div>'+
      '<div class="ornek-kutu">🧪 1/2 bardak su = yarım bardak</div>'+
      '<div class="ornek-kutu">🏪 İndirim: fiyatın 1/4\'ü = çeyreği kadar indirim</div>'+
      '<div class="ornek-kutu">🍕 Pizzanın 2/3\'ü yendi = üçte ikisi bitti</div>'+
    '</div>'+
    '<div class="bolum">'+
      '<h3>Eşdeğer kesirler</h3>'+
      '<p>Aynı miktarı farklı şekillerde gösteren kesirlere <strong>eşdeğer kesir</strong> denir. Bir kesrin payını ve paydasını aynı sayıyla çarparsak değeri değişmez.</p>'+
      '<div class="adim-kutu">1/2 = 2/4 = 3/6 = 4/8 → Hepsi aynı miktarı gösterir: yarım</div>'+
      '<div class="ornek-kutu">Nasıl buluruz? Pay ve paydayı aynı sayıyla çarp:<br>1/2 → pay×2=2, payda×2=4 → 2/4<br>1/2 → pay×3=3, payda×3=6 → 3/6</div>'+
    '</div>'+
    '<div class="bolum">'+
      '<h3>Sadeleştirme nedir?</h3>'+
      '<p>Bir kesri daha sade hale getirmek için pay ve paydayı <strong>aynı sayıya bölme</strong> işlemine <strong>sadeleştirme</strong> denir. Değer değişmez, sadece daha basit görünür.</p>'+
      '<div class="adim-kutu" style="background:var(--bg2);border-left-color:#185FA5;color:var(--text)"><strong style="color:#185FA5">3 adımda sadeleştirme:</strong><br>1. Her ikisini de bölebileceğin bir sayı bul → buna ortak bölen denir<br>2. Pay ve paydayı o sayıya böl<br>3. Ortak bölen kalmayınca dur → en sade hâl</div>'+

      '<div id="kesir-bar" style="margin:1rem 0"></div>'+
    '</div></div>';

  anlatimKurulum:function(){
    var dilim=1,toplam=1;
    function pizzaCiz(){
      var svg=document.getElementById('pizza-svg');if(!svg)return;
      svg.innerHTML='';
      var cx=70,cy=70,r=58;
      var renkler=['#E24B4A','#F09595','#FAEEDA','#EAF3DE','#B5D4F4','#CECBF6','#F5C4B3','#C0DD97'];
      if(toplam===1){
        var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
        c.setAttribute('fill','#E24B4A');c.setAttribute('stroke','white');c.setAttribute('stroke-width','2');
        svg.appendChild(c);
      } else {
        for(var i=0;i<toplam;i++){
          var b=(i/toplam)*2*Math.PI-Math.PI/2;
          var e=((i+1)/toplam)*2*Math.PI-Math.PI/2;
          var x1=cx+r*Math.cos(b),y1=cy+r*Math.sin(b);
          var x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
          var arc=e-b>Math.PI?1:0;
          var p=document.createElementNS('http://www.w3.org/2000/svg','path');
          p.setAttribute('d','M'+cx+' '+cy+' L'+x1+' '+y1+' A'+r+' '+r+' 0 '+arc+' 1 '+x2+' '+y2+' Z');
          p.setAttribute('fill',i<dilim?renkler[i%renkler.length]:'var(--bg2)');
          p.setAttribute('stroke','white');p.setAttribute('stroke-width','2');
          svg.appendChild(p);
        }
      }
      var acik={1:'Bütün pizza = 1 tam. Henüz dilimlenmedi.',2:'İkiye böldük. Her dilim 1/2. Renkli kısım: '+dilim+'/2.',3:'Üçe böldük. Her dilim 1/3. Renkli kısım: '+dilim+'/3.',4:'Dörde böldük. Her dilim 1/4. Renkli kısım: '+dilim+'/4.',6:'Altıya böldük. Her dilim 1/6. Renkli kısım: '+dilim+'/6.',8:'Sekize böldük. Her dilim 1/8. Renkli kısım: '+dilim+'/8.'};
      document.getElementById('pizza-label').textContent=toplam===1?'1 bütün':dilim+' / '+toplam;
      document.getElementById('pizza-acik').textContent=acik[toplam];
    }
    window.pizzaTikla=function(){
      var s=[1,2,3,4,6,8];var idx=s.indexOf(toplam);
      toplam=s[(idx+1)%s.length];dilim=Math.max(1,Math.floor(toplam/2));pizzaCiz();
    };
    pizzaCiz();
    // Sadeleştirme interaktif demo
    var sadelesKesirler=[
      {pay:6,payda:8,adimlar:[{boler:2,yeniPay:3,yeniPayda:4,acik:'6 ve 8&#39;in ikisi de 2&#39;ye bölünür'}]},
      {pay:4,payda:6,adimlar:[{boler:2,yeniPay:2,yeniPayda:3,acik:'4 ve 6&#39;nın ikisi de 2&#39;ye bölünür'}]},
      {pay:9,payda:12,adimlar:[{boler:3,yeniPay:3,yeniPayda:4,acik:'9 ve 12&#39;nin ikisi de 3&#39;e bölünür'}]},
      {pay:10,payda:15,adimlar:[{boler:5,yeniPay:2,yeniPayda:3,acik:'10 ve 15&#39;in ikisi de 5&#39;e bölünür'}]},
    ];
    window.sadeIdx=0;
    window.sadeGoster=function(){
      var demo=document.getElementById('sadeles-demo');
      if(!demo)return;
      var k=sadelesKesirler[window.sadeIdx];
      var a=k.adimlar[0];
      demo.innerHTML=
        '<div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin:0">'+
          '<div style="font-size:12px;color:var(--text2);margin-bottom:12px;font-weight:500">ADIM ADIM DENE — Örnek '+(window.sadeIdx+1)+'/'+sadelesKesirler.length+'</div>'+
          '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center">'+
            '<div style="text-align:center;min-width:70px">'+
              '<div style="font-size:11px;color:var(--text2);margin-bottom:6px">Başlangıç</div>'+
              '<div style="background:var(--bg2);border-radius:var(--r);padding:.75rem 1.25rem;display:inline-block">'+
                '<div style="font-size:28px;font-weight:500;color:#993C1D;border-bottom:2px solid #993C1D;padding-bottom:4px;min-width:30px;text-align:center">'+k.pay+'</div>'+
                '<div style="font-size:28px;font-weight:500;color:#185FA5;padding-top:4px;text-align:center">'+k.payda+'</div>'+
              '</div>'+
            '</div>'+
            '<div style="text-align:center">'+
              '<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Ortak bölen seç:</div>'+
              '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">'+
                [2,3,4,5,6].map(function(n){
                  var gecerli=k.pay%n===0&&k.payda%n===0&&n>1;
                  return '<button onclick="sadeBolenSec('+n+')" style="padding:6px 12px;border-radius:var(--r);border:1.5px solid '+(gecerli?'var(--green)':'var(--border2)')+';background:'+(gecerli?'var(--green-bg)':'var(--bg)')+';color:'+(gecerli?'var(--green-text)':'var(--text3)')+';font-size:13px;font-weight:500;cursor:'+(gecerli?'pointer':'default')+'">÷'+n+'</button>';
                }).join('')+
              '</div>'+
            '</div>'+
            '<div style="text-align:center;min-width:70px" id="sade-sonuc">'+
              '<div style="font-size:11px;color:var(--text2);margin-bottom:6px">Sonuç</div>'+
              '<div style="background:var(--bg2);border-radius:var(--r);padding:.75rem 1.25rem;display:inline-block;opacity:0.3">'+
                '<div style="font-size:28px;font-weight:500;color:var(--green-text);border-bottom:2px solid var(--green);padding-bottom:4px;min-width:30px;text-align:center">?</div>'+
                '<div style="font-size:28px;font-weight:500;color:var(--green-text);padding-top:4px;text-align:center">?</div>'+
              '</div>'+
            '</div>'+
          '</div>'+
          '<div id="sade-acik" class="bilgi-kutu" style="margin-top:12px;min-height:40px">Yeşil bordürlü bölenlerden birini seç!</div>'+
          '<div style="display:flex;gap:8px;margin-top:10px">'+
            '<button onclick="window.sadeGoster()" class="btn" style="flex:1">Yenile</button>'+
            '<button onclick="window.sadeSonraki()" class="btn btn-primary" style="flex:1">Sonraki Örnek →</button>'+
          '</div>'+
        '</div>';
    }
    window.sadeSonraki=function(){
      window.sadeIdx=(window.sadeIdx+1)%sadelesKesirler.length;
      window.sadeGoster();
    };
    window.sadeBolenSec=function(n){
      var k=sadelesKesirler[window.sadeIdx];
      var a=k.adimlar[0];
      if(k.pay%n!==0||k.payda%n!==0){
        document.getElementById('sade-acik').textContent='❌ '+n+', hem '+k.pay+'i hem de '+k.payda+'yi tam bolemiyor. Baska bir sayi dene.';
        return;
      }
      var yeniPay=k.pay/n, yeniPayda=k.payda/n;
      var sonucEl=document.getElementById('sade-sonuc');
      var sadeHal=yeniPay===a.yeniPay&&yeniPayda===a.yeniPayda;
      sonucEl.innerHTML=
        '<div style="font-size:11px;color:var(--green-text);margin-bottom:6px">Sonuç ✓</div>'+
        '<div style="background:var(--green-bg);border-radius:var(--r);padding:.75rem 1.25rem;display:inline-block">'+
          '<div style="font-size:28px;font-weight:500;color:var(--green-text);border-bottom:2px solid var(--green);padding-bottom:4px;text-align:center">'+yeniPay+'</div>'+
          '<div style="font-size:28px;font-weight:500;color:var(--green-text);padding-top:4px;text-align:center">'+yeniPayda+'</div>'+
        '</div>';
      document.getElementById('sade-acik').textContent=
        k.pay+'÷'+n+'='+yeniPay+', '+k.payda+'÷'+n+'='+yeniPayda+
        (sadeHal?' → ✓ En sade hâl! '+k.pay+'/'+k.payda+' = '+yeniPay+'/'+yeniPayda :
        ' → Doğru ama daha da sadeleştirilebilir. '+(yeniPay)+'/'+yeniPayda+' → ortak bölen var mı?');
    };
    window.sadeGoster();
    var kesirler=[{k:'1/2',v:50},{k:'1/3',v:33},{k:'2/3',v:67},{k:'1/4',v:25},{k:'3/4',v:75}];
    var html='<div style="display:flex;flex-direction:column;gap:8px">';
    kesirler.forEach(function(x){
      html+='<div style="display:flex;align-items:center;gap:10px">'+
        '<span style="font-size:14px;font-weight:500;width:36px;color:var(--text2)">'+x.k+'</span>'+
        '<div style="flex:1;background:var(--bg2);border-radius:4px;height:20px;overflow:hidden">'+
          '<div style="width:'+x.v+'%;height:100%;background:#993C1D;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px">'+
            '<span style="font-size:11px;color:white">%'+x.v+'</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    });
    html+='</div>';
    document.getElementById('kesir-bar').innerHTML=html;
  },
  sorular:[
    {s:'Bir pastayı 8 eşit parçaya böldük, 3 tanesini yedik. Bu hangi kesirdir?',sec:['8/3','3/8','1/3','5/8'],d:1,cozum:{sonuc:'Doğru! 3/8: pay = yenen parça, payda = toplam parça.',adimlar:['Toplam parça sayısı → payda → 8','Alınan (yenen) parça → pay → 3','Kesir: 3/8 (sekizde üç)','Dikkat: 8/3 DEĞİL — pay üste, payda alta yazılır.']},gorsel:function(div){var html='<svg viewBox="0 0 120 120" width="110" height="110" style="display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">';var cx=60,cy=60,r=52,n=8;for(var i=0;i<n;i++){var b=(i/n)*2*Math.PI-Math.PI/2,e=((i+1)/n)*2*Math.PI-Math.PI/2;var x1=cx+r*Math.cos(b),y1=cy+r*Math.sin(b),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);html+='<path d="M'+cx+' '+cy+' L'+x1+' '+y1+' A'+r+' '+r+' 0 0 1 '+x2+' '+y2+' Z" fill="'+(i<3?'#E24B4A':'var(--bg2)')+'" stroke="white" stroke-width="2" style="cursor:pointer" onmouseenter="this.style.opacity=0.7" onmouseleave="this.style.opacity=1"/>';;}html+='</svg><div style="text-align:center;font-size:11px;color:var(--text2);margin-top:2px">8 eşit parça — 3 tanesi yendi (kırmızı)</div>';div.innerHTML=html;}},
    {s:'1/2 kesrinde payda kaçtır?',sec:['1','2','1/2 tamamı','Payda yok'],d:1,cozum:{sonuc:'Doğru! 1/2 kesrinde payda 2\'dir.',adimlar:['1/2 → üst kısım (1) = pay','1/2 → alt kısım (2) = payda','Payda, bütünün kaç parçaya bölündüğünü gösterir.','Burada bütün 2 eşit parçaya bölünmüş.']}},
    {s:'"Çeyrek saat" kaç dakikadır? (1 saat = 60 dakika)',sec:['10','15','20','30'],d:1,cozum:{sonuc:'Doğru! Çeyrek saat = 15 dakika.',adimlar:['Çeyrek = 1/4 (dörtte bir)','1 saat = 60 dakika','1/4 saatlik hesap: 60 ÷ 4 = 15 dakika','Yani 1/4 × 60 = 15 dakika.']},gorsel:function(div){div.innerHTML='<div style="display:flex;align-items:center;gap:12px;justify-content:center"><div style="text-align:center"><div style="font-size:11px;color:var(--text2);margin-bottom:3px">1 saat = 60 dk</div><div style="width:70px;height:70px;border-radius:50%;background:conic-gradient(#185FA5 360deg,transparent 0);border:2px solid #185FA5;display:flex;align-items:center;justify-content:center"><span style="font-size:11px;font-weight:500;color:#185FA5">60dk</span></div></div><div style="font-size:18px;color:var(--text2)">→</div><div style="text-align:center"><div style="font-size:11px;color:var(--text2);margin-bottom:3px">1/4 saat = ?</div><div style="width:70px;height:70px;border-radius:50%;background:conic-gradient(#185FA5 90deg, var(--bg2) 0);border:2px solid #185FA5;display:flex;align-items:center;justify-content:center"><span style="font-size:11px;font-weight:500;color:#185FA5">?dk</span></div></div></div>';}},
    {s:'Hangi kesir en büyüktür?',sec:['1/2','1/4','1/8','1/3'],d:0,cozum:{sonuc:'Doğru! 1/2 en büyük kesirdir.',adimlar:['Tüm kesirlerde pay 1 — sadece paydalar farklı.','Payda büyüdükçe her parça küçülür:','1/2 → bütünü 2\'ye böl → büyük parça','1/3 → 3\'e böl → daha küçük','1/4 → 4\'e böl → daha da küçük','1/8 → 8\'e böl → en küçük parça','Sonuç: 1/2 > 1/3 > 1/4 > 1/8']},gorsel:function(div){var k=[{k:'1/2',v:50},{k:'1/4',v:25},{k:'1/8',v:12.5},{k:'1/3',v:33}];var html='<div style="display:flex;gap:6px;justify-content:center">';k.forEach(function(x){var a=x.v/100*360;html+='<div style="text-align:center"><svg viewBox="0 0 50 50" width="48" height="48" xmlns="http://www.w3.org/2000/svg"><circle cx="25" cy="25" r="22" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.5"/><path d="M25 25 L25 3 A22 22 0 '+(x.v>50?1:0)+' 1 '+(25+22*Math.sin(a*Math.PI/180))+' '+(25-22*Math.cos(a*Math.PI/180))+' Z" fill="#993C1D" opacity="0.8"/></svg><div style="font-size:11px;font-weight:500;color:#993C1D;margin-top:1px">'+ x.k+'</div></div>';});div.innerHTML=html+'</div>';}},
    {s:'3/3 kesri neye eşittir?',sec:['1/3','0','1 bütün','3'],d:2,cozum:{sonuc:'Doğru! 3/3 = 1 bütün.',adimlar:['3/3 → bütünü 3\'e böldük, 3 parça aldık.','Yani bütün parçaları aldık.','Pay = Payda olduğunda kesir = 1 bütün.','Başka örnekler: 4/4 = 1, 7/7 = 1, 100/100 = 1']},gorsel:function(div){var html='<svg viewBox="0 0 120 120" width="100" height="100" style="display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">';var cx=60,cy=60,r=50,n=3;for(var i=0;i<n;i++){var b=(i/n)*2*Math.PI-Math.PI/2,e=((i+1)/n)*2*Math.PI-Math.PI/2;var x1=cx+r*Math.cos(b),y1=cy+r*Math.sin(b),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);html+='<path d="M'+cx+' '+cy+' L'+x1+' '+y1+' A'+r+' '+r+' 0 0 1 '+x2+' '+y2+' Z" fill="#E24B4A" stroke="white" stroke-width="2"/>';;}html+='<text x="60" y="65" text-anchor="middle" font-size="14" fill="white" font-weight="bold">3/3</text>';html+='</svg><div style="text-align:center;font-size:11px;color:var(--text2);margin-top:2px">3&#39;e bölünmüş, 3 parça alındı = ?</div>';div.innerHTML=html;}},

    {s:'4/4 kesri ile 6/6 kesrini karşılaştır.',sec:['4/4 > 6/6','4/4 < 6/6','4/4 = 6/6','Karşılaştırılamaz'],d:2,cozum:{sonuc:'Doğru! Her ikisi de 1 bütüne eşittir.',adimlar:['4/4 → bütünü 4\'e böl, 4 parça al → tamamı → 1','6/6 → bütünü 6\'ya böl, 6 parça al → tamamı → 1','Pay = Payda olan her kesir 1\'e eşittir.','4/4 = 6/6 = 8/8 = 100/100 = 1']},gorsel:function(div){var html='<div style="display:flex;gap:10px;justify-content:center">';[[4,'4/4'],[6,'6/6']].forEach(function(x){var n=x[0];var svgH='<svg viewBox="0 0 80 80" width="72" height="72" xmlns="http://www.w3.org/2000/svg">';for(var i=0;i<n;i++){var b=(i/n)*2*Math.PI-Math.PI/2,e=((i+1)/n)*2*Math.PI-Math.PI/2;var x1=40+35*Math.cos(b),y1=40+35*Math.sin(b),x2=40+35*Math.cos(e),y2=40+35*Math.sin(e);svgH+='<path d="M40 40 L'+x1+' '+y1+' A35 35 0 0 1 '+x2+' '+y2+' Z" fill="#993C1D" stroke="white" stroke-width="1.5"/>';;}svgH+='</svg>';html+='<div style="text-align:center">'+svgH+'<div style="font-size:12px;font-weight:500;color:#993C1D;margin-top:2px">'+x[1]+'</div></div>';});div.innerHTML=html+'</div>';}}

{
  id:'d5',baslik:'Ondalıklı sayılar',renk:'#E1F5EE',renk2:'#0F6E56',
  rozet:{id:'r5',ad:'Ondalık Ustası',acik:'Ondalıklı sayılar dersini tamamladın'},
  anlatim:function(){
    return '<div class="kart"><div class="bolum">'+
      '<h3>Ondalıklı sayı nedir?</h3>'+
      '<p>Tam sayılar arasındaki değerleri göstermek için <strong>ondalıklı sayılar</strong> kullanılır. Türkiye\'de virgül (,) kullanılır: <strong>3,75</strong></p>'+
      '<div style="background:var(--bg2);border-radius:var(--rl);padding:1.25rem;margin:1rem 0;text-align:center">'+
        '<div style="display:flex;align-items:baseline;justify-content:center;gap:4px;font-size:44px;font-weight:500">'+
          '<span id="od-tam" style="color:#0F6E56;cursor:pointer;border-radius:6px;padding:2px 8px;transition:background .15s" onclick="odTikla(0)">3</span>'+
          '<span style="color:var(--text2);font-size:30px">,</span>'+
          '<span id="od-onda" style="color:#185FA5;cursor:pointer;border-radius:6px;padding:2px 8px;transition:background .15s" onclick="odTikla(1)">7</span>'+
          '<span id="od-yuzde" style="color:#993C1D;cursor:pointer;border-radius:6px;padding:2px 8px;transition:background .15s" onclick="odTikla(2)">5</span>'+
        '</div>'+
        '<div id="od-acik" class="bilgi-kutu" style="margin:12px 0 0;text-align:left">Her rakama tıkla, hangi basamakta olduğunu gör.</div>'+
      '</div>'+
    '</div>'+
    '<div class="bolum">'+
      '<h3>Ondalık basamaklar</h3>'+
      '<p>Virgülden sonraki rakamlar küçük değerleri ifade eder:</p>'+
      '<div style="overflow-x:auto;margin:1rem 0"><table style="width:100%;border-collapse:collapse;font-size:13px;text-align:center">'+
        '<tr style="background:var(--bg2)"><td style="padding:8px;border:0.5px solid var(--border)">TAM KISIM</td><td style="padding:8px;border:0.5px solid var(--border)">VİRGÜL</td><td style="padding:8px;border:0.5px solid var(--border)">ONDA BİRLER</td><td style="padding:8px;border:0.5px solid var(--border)">YÜZDE BİRLER</td><td style="padding:8px;border:0.5px solid var(--border)">BİNDE BİRLER</td></tr>'+
        '<tr><td style="padding:8px;border:0.5px solid var(--border);font-weight:500">3</td><td style="padding:8px;border:0.5px solid var(--border)">,</td><td style="padding:8px;border:0.5px solid var(--border);color:#185FA5;font-weight:500">7</td><td style="padding:8px;border:0.5px solid var(--border);color:#993C1D;font-weight:500">5</td><td style="padding:8px;border:0.5px solid var(--border);color:var(--text2)">0</td></tr>'+
        '<tr style="background:var(--bg2)"><td style="padding:6px;border:0.5px solid var(--border);font-size:11px;color:var(--text2)">3×1</td><td style="padding:6px;border:0.5px solid var(--border)"></td><td style="padding:6px;border:0.5px solid var(--border);font-size:11px;color:#185FA5">7÷10 = 0,7</td><td style="padding:6px;border:0.5px solid var(--border);font-size:11px;color:#993C1D">5÷100 = 0,05</td><td style="padding:6px;border:0.5px solid var(--border);font-size:11px;color:var(--text2)">0÷1000 = 0</td></tr>'+
      '</table></div>'+
      '<div class="adim-kutu">3,75 = 3 + 0,7 + 0,05 = 3 tam, 7 onda birlik, 5 yüzde birlik</div>'+
    '</div>'+
    '<div class="bolum">'+
      '<h3>Gerçek hayat: market fişi</h3>'+
      '<p>Ondalıklı sayılar her gün fiyatlarda karşımıza çıkar. Ürünlere tıklayarak seç, toplama bak:</p>'+
      '<div style="background:var(--bg2);border-radius:var(--rl);padding:1rem;margin:1rem 0">'+
        '<div id="fis-liste"></div>'+
        '<div style="border-top:0.5px solid var(--border);margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;font-size:14px;font-weight:500">'+
          '<span>Toplam</span><span id="fis-toplam" style="color:#0F6E56">0,00 TL</span>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="bolum">'+
      '<h3>Ondalıklı sayıları karşılaştırma</h3>'+
      '<p>İki ondalıklı sayıyı karşılaştırırken <strong>soldan sağa basamak basamak</strong> karşılaştır:</p>'+
      '<div class="adim-kutu">Adım 1: Tam kısımları karşılaştır (büyükse o sayı büyüktür)<br>Adım 2: Eşitse virgülden sonra ilk haneye bak<br>Adım 3: Yine eşitse bir sonraki haneye geç</div>'+
      '<div class="ornek-kutu">0,9 ile 0,09 karşılaştır:<br>Tam kısım: 0 = 0 (eşit)<br>Onda birler: 9 > 0 → 0,9 BÜYÜK</div>'+
      '<div class="bilgi-kutu">İpucu: Eşit sayıda basamak için sona sıfır ekle. 0,9 = 0,90 → 0,90 > 0,09 açıkça görülür.</div>'+
    '</div>'+    '<div class="bolum">'+
      '<h3>Ondalıklı sayı doğrusu</h3>'+
      '<p>Ondalıklı sayılar tam sayılar arasında konumlanır. Kaydır, gör:</p>'+
      '<input type="range" id="od-slider" min="0" max="500" value="250" style="width:100%;margin:.5rem 0" oninput="odSlider(this.value)">'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2)"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>'+
      '<div id="od-slider-label" style="text-align:center;font-size:20px;font-weight:500;margin-top:8px;color:#0F6E56">2,50</div>'+
    '</div></div>';
  },
  anlatimKurulum:function(){
    var aciklar=[
      '3 → TAM KISIM (virgülün solu)\nDeğeri: 3 × 1 = 3\nBu kısım tam sayıdır.',
      '7 → ONDA BİRLER basamağı (virgülden sonra 1. hane)\nDeğeri: 7 ÷ 10 = 0,7\nYani 7 onda birlik parça.',
      '5 → YÜZDE BİRLER basamağı (virgülden sonra 2. hane)\nDeğeri: 5 ÷ 100 = 0,05\nYani 5 yüzde birlik parça.'
    ];
    window.odTikla=function(i){
      var idler=['od-tam','od-onda','od-yuzde'];
      var renkler=['#E1F5EE','#E6F1FB','#FAECE7'];
      idler.forEach(function(id,j){
        document.getElementById(id).style.background=j===i?renkler[j]:'';
      });
      document.getElementById('od-acik').textContent=aciklar[i];
    };
    var urunler=[{ad:'Ekmek',fiyat:9.50},{ad:'Süt 1L',fiyat:27.75},{ad:'Yumurta (10\'lu)',fiyat:45.00},{ad:'Peynir 200g',fiyat:38.25}];
    var secili=[];
    function fisGuncelle(){
      var html=urunler.map(function(u,i){
        var sec=secili.indexOf(i)>=0;
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);cursor:pointer" onclick="fisTikla('+i+')">'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<div style="width:16px;height:16px;border-radius:4px;border:0.5px solid var(--border2);background:'+(sec?'var(--teal)':'')+'"></div>'+
            '<span style="font-size:13px">'+u.ad+'</span>'+
          '</div>'+
          '<span style="font-size:13px;font-weight:500;color:'+(sec?'var(--teal)':'var(--text2)')+'">'+u.fiyat.toFixed(2)+' TL</span>'+
        '</div>';
      }).join('');
      document.getElementById('fis-liste').innerHTML=html;
      var top=secili.reduce(function(t,i){return t+urunler[i].fiyat;},0);
      document.getElementById('fis-toplam').textContent=top.toFixed(2)+' TL';
    }
    window.fisTikla=function(i){
      var idx=secili.indexOf(i);
      if(idx>=0)secili.splice(idx,1);else secili.push(i);
      fisGuncelle();
    };
    fisGuncelle();
    window.odSlider=function(v){
      document.getElementById('od-slider-label').textContent=(v/100).toFixed(2);
    };
  },
  sorular:[
    {s:'12,75 sayısında 7 rakamı hangi basamaktadır?',sec:['Birler','Onlar','Onda birler','Yüzde birler'],d:2,cozum:{sonuc:'Doğru! 7, onda birler basamağındadır.',adimlar:['12,75 → virgülün solunda: 12 (tam kısım)','Virgülün sağında: 7 ve 5','Virgülden sonra ilk hane → onda birler','7 → onda birler → değeri: 7÷10 = 0,7']},gorsel:function(div){div.innerHTML='<div style="background:var(--bg2);border-radius:8px;padding:8px;text-align:center"><div style="display:flex;align-items:baseline;justify-content:center;gap:2px;font-size:30px;font-weight:500"><span style="color:#0F6E56">12</span><span style="color:var(--text2);font-size:20px">,</span><span style="color:#185FA5;background:#E6F1FB;border-radius:4px;padding:0 6px">7</span><span style="color:#993C1D">5</span></div><div style="font-size:11px;color:var(--text2);margin-top:5px">7 → virgulden sonra 1. hane = onda birler</div></div>';}},

{
  id:'d6',baslik:'Yüzdeler',renk:'#FAEEDA',renk2:'#854F0B',
  rozet:{id:'r6',ad:'Yüzde Uzmanı',acik:'Yüzdeler dersini tamamladın'},
  anlatim:function(){
    return '<div class="kart"><div class="bolum">'+
      '<h3>Yüzde nedir?</h3>'+
      '<p><strong>Yüzde (%)</strong>, bir miktarın 100 üzerinden ifadesidir. "Yüzde" kelimesi kelime anlamıyla "yüzde biri" demektir.</p>'+
      '<p>%50 → "yüzde elli" → 100\'ün 50\'si → yani <strong>yarısı</strong></p>'+
      '<div style="margin:1rem 0">'+
        '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">'+
          '<span style="color:var(--text2)">Kaydır ve gözlemle</span>'+
          '<span id="yuzde-goster" style="font-weight:500;color:#854F0B">%50</span>'+
        '</div>'+
        '<input type="range" id="yuzde-slider" min="0" max="100" value="50" style="width:100%" oninput="yuzdeSlider(this.value)">'+
        '<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:2px;margin-top:10px" id="yuzde-grid"></div>'+
        '<div id="yuzde-acik" class="bilgi-kutu" style="margin-top:10px"></div>'+
      '</div>'+
    '</div>'+
    '<div class="bolum">'+
      '<h3>Yüzde hesaplama</h3>'+
      '<p>Bir sayının yüzdesini bulmak için:</p>'+
      '<div class="adim-kutu">Yüzde hesabı = Sayı × Yüzde ÷ 100</div>'+
      '<div class="ornek-kutu">300 TL\'nin %20\'si = 300 × 20 ÷ 100 = 60 TL</div>'+
      '<div class="ornek-kutu">40 öğrencinin %25\'i = 40 × 25 ÷ 100 = 10 öğrenci</div>'+
    '</div>'+
    '<div class="bolum">'+
      '<h3>İndirim hesaplama</h3>'+
      '<p>En sık kullanılan yüzde uygulaması indirim hesabıdır:</p>'+
      '<div style="background:var(--bg2);border-radius:var(--rl);padding:1.25rem;margin:1rem 0">'+
        '<div style="font-size:13px;color:var(--text2);margin-bottom:10px">İndirim hesaplayıcı — dene!</div>'+
        '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">'+
          '<div style="flex:1;min-width:120px"><label style="font-size:11px;color:var(--text2)">Ürün fiyatı (TL)</label>'+
            '<input type="number" id="ind-fiyat" value="200" style="width:100%;padding:6px 8px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;margin-top:4px" oninput="indHesapla()"></div>'+
          '<div style="flex:1;min-width:120px"><label style="font-size:11px;color:var(--text2)">İndirim oranı (%)</label>'+
            '<input type="number" id="ind-oran" value="25" min="0" max="100" style="width:100%;padding:6px 8px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;margin-top:4px" oninput="indHesapla()"></div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;text-align:center">'+
          '<div style="background:var(--bg);border-radius:var(--r);padding:.75rem"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">İndirim miktarı</div><div id="ind-miktar" style="font-size:18px;font-weight:500;color:#E24B4A">50 TL</div></div>'+
          '<div style="background:var(--bg);border-radius:var(--r);padding:.75rem"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Yeni fiyat</div><div id="ind-yeni" style="font-size:18px;font-weight:500;color:#0F6E56">150 TL</div></div>'+
          '<div style="background:var(--bg);border-radius:var(--r);padding:.75rem"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Kazanç</div><div id="ind-kazanc" style="font-size:18px;font-weight:500;color:#854F0B">%25</div></div>'+
        '</div>'+
        '<div id="ind-adimlar" class="adim-kutu" style="margin-top:12px"></div>'+
      '</div>'+
    '<div class="bolum">'+
      '<h3>Yüzde artış ve azalış</h3>'+
      '<p>İki farklı işlem var: <strong>artış</strong> (zam) ve <strong>azalış</strong> (indirim). Her ikisi de aynı formülle hesaplanır.</p>'+
      '<div class="adim-kutu">Artış miktarı = Başlangıç × Oran ÷ 100<br>Yeni değer (artış) = Başlangıç + Artış miktarı<br>Yeni değer (azalış) = Başlangıç - Azalış miktarı</div>'+
      '<div class="ornek-kutu">100 TL&#39;ye %20 ZAM: 100 × 20 ÷ 100 = 20 TL → yeni fiyat: 120 TL</div>'+
      '<div class="ornek-kutu">100 TL&#39;ye %20 İNDİRİM: 100 × 20 ÷ 100 = 20 TL → yeni fiyat: 80 TL</div>'+
      '<div class="bilgi-kutu">Dikkat: %20 zam sonra %20 indirim yapılırsa başa dönülmez! 100→120→96 olur.</div>'+
    '</div>'+    '</div></div>';
  },
  anlatimKurulum:function(){
    function yuzdeGuncelle(v){
      v=parseInt(v);
      var html='';
      for(var i=0;i<100;i++) html+='<div style="aspect-ratio:1;border-radius:2px;background:'+(i<v?'#854F0B':'var(--border)')+'"></div>';
      document.getElementById('yuzde-grid').innerHTML=html;
      var mesajlar={0:'%0: Hiçbir şey yok.',10:'%10: Her 10 birimden 1\'i. Yani onda biri.',25:'%25: Çeyrek. Dörtte biri.',50:'%50: Tam yarısı.',75:'%75: Dörtte üçü.',100:'%100: Tamamı, bütünü.'};
      document.getElementById('yuzde-acik').textContent=mesajlar[v]||'%'+v+': 100 kutunun '+v+' tanesi.';
      document.getElementById('yuzde-goster').textContent='%'+v;
    }
    window.yuzdeSlider=function(v){yuzdeGuncelle(parseInt(v));};
    yuzdeGuncelle(50);
    window.indHesapla=function(){
      var f=parseFloat(document.getElementById('ind-fiyat').value)||0;
      var p=parseFloat(document.getElementById('ind-oran').value)||0;
      var m=Math.round(f*p/100*100)/100;
      var y=Math.round((f-m)*100)/100;
      document.getElementById('ind-miktar').textContent=m.toFixed(2)+' TL';
      document.getElementById('ind-yeni').textContent=y.toFixed(2)+' TL';
      document.getElementById('ind-kazanc').textContent='%'+p;
      document.getElementById('ind-adimlar').textContent=
        f+' TL × '+p+' ÷ 100 = '+m.toFixed(2)+' TL indirim\n'+f+' - '+m.toFixed(2)+' = '+y.toFixed(2)+' TL yeni fiyat';
    };
    indHesapla();
  },
  sorular:[
    {s:'%25 ne anlama gelir?',sec:['25\'e bölmek','100\'ün 25\'i yani dörtte biri','25 ile çarpmak','25 eklemek'],d:1,cozum:{sonuc:'Doğru! %25 = 100\'ün 25 parçası = 1/4.',adimlar:['% işareti "yüzde" = "100\'de" anlamına gelir.','%25 → 100\'ün 25\'i','100 birimi 4 eşit parçaya bölelim → her parça 25','Yani %25 = 1/4 = çeyrek']}},
    {s:'200 TL\'nin %10\'u kaç TL\'dir?',sec:['10 TL','20 TL','200 TL','100 TL'],d:1,cozum:{sonuc:'Doğru! 200 TL\'nin %10\'u = 20 TL.',adimlar:['Formül: Sayı × Yüzde ÷ 100','200 × 10 ÷ 100','= 2000 ÷ 100','= 20 TL']},gorsel:function(div){div.innerHTML='<div style="display:flex;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap;font-size:13px;font-weight:500"><div style="background:#E6F1FB;border-radius:8px;padding:6px 10px;color:#0C447C">200 TL</div><div>×</div><div style="background:#FAEEDA;border-radius:8px;padding:6px 10px;color:#633806">%10</div><div>÷ 100 =</div><div style="background:var(--bg2);border-radius:8px;padding:6px 10px;color:var(--text2)">?</div></div>';}},
    {s:'30 öğrencinin %60\'ı kız. Kaç kız öğrenci var?',sec:['6','18','12','20'],d:1,cozum:{sonuc:'Doğru! 30 öğrencinin %60\'ı = 18 kız.',adimlar:['Formül: Sayı × Yüzde ÷ 100','30 × 60 ÷ 100','= 1800 ÷ 100','= 18 kız öğrenci']},gorsel:function(div){var html='<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:2px;margin:2px 0">';for(var i=0;i<30;i++)html+='<div style="aspect-ratio:1;border-radius:2px;background:var(--bg2);border:0.5px solid var(--border)"></div>';div.innerHTML=html+'</div><div style="font-size:11px;color:var(--text2);text-align:center;margin-top:2px">30 öğrencinin %60&#39;ı kız = ? kişi</div>';}},
    {s:'150 TL\'lik ürüne %20 zam yapıldı. Yeni fiyat kaçtır?',sec:['170 TL','180 TL','130 TL','120 TL'],d:1,cozum:{sonuc:'Doğru! Yeni fiyat 180 TL.',adimlar:['Adım 1: Zam miktarını bul','150 × 20 ÷ 100 = 30 TL zam','Adım 2: Zammı ekle','150 + 30 = 180 TL yeni fiyat']},gorsel:function(div){div.innerHTML='<div style="display:flex;flex-direction:column;gap:6px;align-items:center"><div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;flex-wrap:wrap;justify-content:center"><div style="background:#E6F1FB;border-radius:8px;padding:6px 10px;color:#0C447C">150 TL</div><div>+ %20 zam =</div><div style="background:var(--bg2);border-radius:8px;padding:6px 10px;color:var(--text2)">?</div></div><div style="font-size:11px;color:var(--text2)">Önce zam miktarını bul: 150 × 20 ÷ 100</div></div>';}},
    {s:'%100 ne anlama gelir?',sec:['Çok fazla, normali aşmış','Yarısı','Tamamı, bütünü','Hiçbiri'],d:2,cozum:{sonuc:'Doğru! %100 = tamamı.',adimlar:['%100 → 100\'ün 100\'ü','100/100 = 1 → yani bütünün tamamı','%100 indirim → ücretsiz','%100 doluluk → tamamen dolu']}},
    {s:'80 TL\'lik ürün %50 indirimde kaç TL\'ye satılır?',sec:['50 TL','40 TL','30 TL','60 TL'],d:1,cozum:{sonuc:'Doğru! %50 indirimde 40 TL.',adimlar:['%50 = yarısı demek','80 TL\'nin yarısı = 80 ÷ 2 = 40 TL indirim','Yeni fiyat: 80 - 40 = 40 TL','Veya doğrudan: 80 × 50 ÷ 100 = 40 TL']},gorsel:function(div){div.innerHTML='<div style="display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap"><div style="text-align:center;background:var(--bg2);border-radius:8px;padding:8px 10px"><div style="font-size:10px;color:var(--text2)">Eski fiyat</div><div style="font-size:18px;font-weight:500;text-decoration:line-through;color:var(--text2)">80 TL</div></div><div style="background:#FAEEDA;border-radius:8px;padding:5px 8px;color:#633806;font-size:12px;font-weight:500">%50 İndirim</div><div style="text-align:center;background:var(--green-bg);border-radius:8px;padding:8px 10px"><div style="font-size:10px;color:var(--green-text)">Yeni fiyat</div><div style="font-size:18px;font-weight:500;color:var(--green-text)">? TL</div></div></div>';}},
    {s:'Sınavda 50 sorudan 40\'ını doğru yaptın. Başarı yüzden kaç?',sec:['%40','%80','%50','%75'],d:1,cozum:{sonuc:'Doğru! 40/50 = %80.',adimlar:['Yüzde hesabı: (Doğru ÷ Toplam) × 100','(40 ÷ 50) × 100','= 0,8 × 100','= %80']},gorsel:function(div){div.innerHTML='<div style="display:flex;align-items:center;gap:6px;justify-content:center;font-size:13px;font-weight:500;flex-wrap:wrap"><div style="background:#E6F1FB;border-radius:8px;padding:6px 10px;color:#0C447C">50 soru</div><div>→</div><div style="background:var(--green-bg);border-radius:8px;padding:6px 10px;color:var(--green-text)">40 doğru</div><div>=</div><div style="background:var(--bg2);border-radius:8px;padding:6px 10px;color:var(--text2)">%?</div></div>';}},
    {s:'%10 kaça eşittir?',sec:['1/10 (onda bir)','1/100','1/2','10'],d:0,cozum:{sonuc:'Doğru! %10 = 1/10.',adimlar:['%10 → 100\'ün 10\'u → 10/100','10/100 sadeleştir: ikisini de 10\'a böl','10÷10 = 1, 100÷10 = 10','Sonuç: 1/10 = onda bir']}},
    {s:'500 TL\'nin %20\'si kaç TL?',sec:['20 TL','100 TL','200 TL','50 TL'],d:1,cozum:{sonuc:'Doğru! 500 TL\'nin %20\'si = 100 TL.',adimlar:['500 × 20 ÷ 100','= 10000 ÷ 100','= 100 TL']},gorsel:function(div){div.innerHTML='<div style="display:flex;align-items:center;gap:6px;justify-content:center;font-size:13px;font-weight:500;flex-wrap:wrap"><div style="background:#E6F1FB;border-radius:8px;padding:6px 10px;color:#0C447C">500 TL</div><div>× %20 ÷ 100 =</div><div style="background:var(--bg2);border-radius:8px;padding:6px 10px;color:var(--text2)">?</div></div>';}},

{
  id:'d7',baslik:'Kesir, ondalık ve yüzde dönüşümleri',renk:'#EEEDFE',renk2:'#534AB7',
  rozet:{id:'r7',ad:'Dönüşüm Uzmanı',acik:'Dönüşümler dersini tamamladın'},
  anlatim:function(){
    return '<div class="kart"><div class="bolum">'+
      '<h3>Üç gösterim, tek değer</h3>'+
      '<p>Kesir, ondalık ve yüzde — bunlar aynı değeri farklı biçimlerde ifade eder. Aralarında dönüşüm yapmak matematiğin temel becerilerinden biridir.</p>'+

        '<input type="range" id="don-slider" min="0" max="100" value="50" style="width:100%" oninput="donSlider(this.value)">'+
        '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px">'+
          '<div style="background:var(--bg);border-radius:var(--r);padding:1rem;text-align:center">'+
            '<div style="font-size:11px;color:var(--purple-text);margin-bottom:6px;font-weight:500">KESİR</div>'+
            '<div id="don-kesir" style="font-size:22px;font-weight:500;color:#534AB7">1/2</div>'+
          '</div>'+

/* ========== DURUM ========== */
var aktifKullanici=null,ilerleme=[],aktifDers=null,quizSoru=0,quizDogru=0,quizNokta=[];

/* ========== SUPABASE ========== */
function yukle(){
  document.getElementById('yukleniyor').style.display='block';
  sb.from('ilerleme').select('*').eq('kullanici_adi',aktifKullanici)
    .then(function(r){
      ilerleme=(r&&r.data)?r.data:[];
      document.getElementById('yukleniyor').style.display='none';
      anaSayfaGuncelle();
    }).catch(function(){
      ilerleme=[];
      document.getElementById('yukleniyor').style.display='none';
      anaSayfaGuncelle();
    });
}
function kaydet(dersId,dogru){
  sb.from('ilerleme').upsert({
    kullanici_adi:aktifKullanici,ders_id:dersId,
    tamamlandi:true,skor:dogru,tarih:new Date().toISOString()
  },{onConflict:'kullanici_adi,ders_id'})
  .then(function(){yukle();}).catch(function(){});
}
function tamamlandiMi(id){return ilerleme.some(function(r){return r.ders_id===id&&r.tamamlandi;});}
function toplamDogru(){return ilerleme.reduce(function(t,r){return t+(r.skor||0);},0);}

/* ========== NAVİGASYON ========== */
function ekranGoster(id){
  document.querySelectorAll('.ekran').forEach(function(e){e.classList.remove('aktif');});
  document.getElementById(id).classList.add('aktif');
  if(id==='ekran-anasayfa')anaSayfaGuncelle();
  if(id==='ekran-istatistik')istatGuncelle();
}
function girisYap(){
  var ad=document.getElementById('isim-input').value.trim();
  if(!ad){
    document.getElementById('giris-hata').style.display='block';
    document.getElementById('giris-hata').textContent='Lütfen adını yaz.';
    return;
  }
  aktifKullanici=ad;
  document.getElementById('hosgeldin').textContent=ad;
  document.getElementById('giris-hata').style.display='none';
  ekranGoster('ekran-anasayfa');
  yukle();
}
function cikisYap(){
  aktifKullanici=null;ilerleme=[];
  document.getElementById('isim-input').value='';
  ekranGoster('ekran-giris');
}

/* ========== ANA SAYFA ========== */
function anaSayfaGuncelle(){
  if(!aktifKullanici)return;
  var tam=DERSLER.filter(function(d){return tamamlandiMi(d.id);}).length;
  var pct=Math.round(tam/DERSLER.length*100);
  document.getElementById('genel-pct').textContent=pct+'%';
  document.getElementById('genel-bar').style.width=pct+'%';
  var liste=document.getElementById('ders-listesi');
  liste.innerHTML='';
  DERSLER.forEach(function(d,i){
    var tamam=tamamlandiMi(d.id);
    var kilitli=false;
    var div=document.createElement('div');
    div.className='ders-kart'+(tamam?' tamamlandi':'')+(kilitli?' kilitli':'');
    div.innerHTML=
      '<div class="ders-no" style="background:'+d.renk+';color:'+d.renk2+'">'+(tamam?'✓':(i+1))+'</div>'+
      '<div style="flex:1"><div style="font-size:14px;font-weight:500;margin-bottom:2px">'+d.baslik+'</div>'+
      '<div style="font-size:12px;color:var(--text2)">'+d.sorular.length+' soru · '+(tamam?'Tamamlandı':'Bekliyor')+'</div></div>'+
      (kilitli?'<span style="font-size:12px;color:var(--text3)">Kilitli</span>':
       tamam?'<span class="badge badge-green">Tekrar</span>':'<span class="badge badge-blue">Başla</span>');
    if(!kilitli)div.onclick=function(){dersAc(d);};
    liste.appendChild(div);
  });
}

/* ========== DERS (ANLATIM) ========== */
function dersAc(ders){
  aktifDers=ders;
  document.getElementById('ders-nav-baslik').textContent=ders.baslik;
  document.getElementById('ders-icerik').innerHTML=ders.anlatim();
  ekranGoster('ekran-ders');
  setTimeout(function(){if(ders.anlatimKurulum)ders.anlatimKurulum();},100);
}

/* ========== QUIZ ========== */
function quizBaslat(){
  if(!aktifDers)return;
  quizSoru=0;quizDogru=0;quizNokta=new Array(aktifDers.sorular.length).fill('');
  document.getElementById('quiz-nav-baslik').textContent=aktifDers.baslik;
  ekranGoster('ekran-quiz');
  soruGoster();
}
function soruGoster(){
  var q=aktifDers.sorular[quizSoru];
  if(!q){quizBitti();return;}
  var noktaHtml=quizNokta.map(function(n,i){
    var cls='quiz-nokta'+(i===quizSoru?' aktif':n==='d'?' dogru-nokta':n==='y'?' yanlis-nokta':'');
    return '<div class="'+cls+'"></div>';
  }).join('');
  var gorselHtml='';
  if(q.gorsel){
    gorselHtml='<div id="quiz-gorsel" style="margin-bottom:1rem;padding:10px;background:var(--bg2);border-radius:var(--r)"></div>';
  }
  var html='<div class="quiz-ilerleme">'+noktaHtml+'</div>'+
    '<div class="kart">'+
      '<div style="font-size:13px;color:var(--text2);margin-bottom:8px">Soru '+(quizSoru+1)+' / '+aktifDers.sorular.length+'</div>'+
      '<div style="font-size:15px;font-weight:500;margin-bottom:1rem;line-height:1.5">'+q.s+'</div>'+
      gorselHtml+
      '<div id="secenekler">'+
        q.sec.map(function(s,i){
          return '<button class="secenek-btn" onclick="cevapla(this,'+i+')">'+s+'</button>';
        }).join('')+
      '</div>'+
      '<div class="cozum-kutu" id="cozum-kutu"></div>'+
      '<button class="btn btn-primary btn-block" id="devam-btn" style="display:none;margin-top:14px" onclick="devamEt()"></button>'+
    '</div>';
  document.getElementById('quiz-icerik').innerHTML=html;
  if(q.gorsel){
    var gDiv=document.getElementById('quiz-gorsel');
    if(gDiv) q.gorsel(gDiv);
  }
}
function cevapla(el,secilen){
  var q=aktifDers.sorular[quizSoru];
  document.querySelectorAll('.secenek-btn').forEach(function(b){b.disabled=true;});
  var dogru=secilen===q.d;
  if(dogru){
    el.classList.add('dogru');
    quizDogru++;quizNokta[quizSoru]='d';
  } else {
    el.classList.add('yanlis');
    document.querySelectorAll('.secenek-btn')[q.d].classList.add('dogru');
    quizNokta[quizSoru]='y';
  }
  var kutu=document.getElementById('cozum-kutu');
  kutu.style.display='block';
  kutu.className='cozum-kutu '+(dogru?'dogru-cozum':'yanlis-cozum');
  var icerik='<div style="font-weight:500;margin-bottom:10px;color:'+(dogru?'var(--green)':'var(--red)')+'">'+(dogru?'✓ ':'✗ ')+q.cozum.sonuc+'</div>';
  icerik+='<div style="font-size:12px;font-weight:500;margin-bottom:4px;opacity:.7">ADIM ADIM ÇÖZÜM:</div>';
  q.cozum.adimlar.forEach(function(a,i){
    icerik+='<div class="cozum-adim"><span style="opacity:.6;margin-right:6px">'+(i+1)+'.</span>'+a+'</div>';
  });
  kutu.innerHTML=icerik;
  var btn=document.getElementById('devam-btn');
  btn.style.display='block';
  btn.textContent=quizSoru+1>=aktifDers.sorular.length?'Sonucu Gör →':'Sonraki Soru →';
}
function devamEt(){quizSoru++;soruGoster();}
function quizBitti(){
  var toplam=aktifDers.sorular.length;
  var pct=Math.round(quizDogru/toplam*100);
  kaydet(aktifDers.id,quizDogru);
  var daire=document.getElementById('sonuc-daire');
  daire.style.background=pct>=70?'var(--green-bg)':'var(--red-bg)';
  document.getElementById('sonuc-sayi').style.color=pct>=70?'var(--green-text)':'var(--red-text)';
  document.getElementById('sonuc-sayi').textContent=quizDogru+'/'+toplam;
  document.getElementById('sonuc-alt').textContent=pct+'%';
  document.getElementById('sonuc-alt').style.color=pct>=70?'var(--green)':'var(--red)';
  document.getElementById('sonuc-baslik').textContent=pct>=80?'Mükemmel!':pct>=60?'İyi iş!':'Tekrar dene';
  document.getElementById('sonuc-metin').textContent=pct>=70?aktifDers.baslik+' dersini başarıyla tamamladın.':'Bazı konuları ders anlatımından tekrar inceleyebilirsin.';
  document.getElementById('sonuc-rozet').innerHTML='<span class="rozet-kazanildi">'+aktifDers.rozet.ad+' rozeti kazanıldı</span>';
  var idx=DERSLER.findIndex(function(d){return d.id===aktifDers.id;});
  var btn=document.getElementById('sonraki-btn');
  if(idx<DERSLER.length-1){btn.style.display='';btn.onclick=function(){dersAc(DERSLER[idx+1]);};}
  else{btn.style.display='none';}
  ekranGoster('ekran-sonuc');
}

/* ========== İSTATİSTİK ========== */
function istatGuncelle(){
  var tam=DERSLER.filter(function(d){return tamamlandiMi(d.id);}).length;
  document.getElementById('is-tam').textContent=tam;
  document.getElementById('is-dogru').textContent=toplamDogru();
  document.getElementById('is-rozet').textContent=tam;
  document.getElementById('rozet-listesi').innerHTML=DERSLER.map(function(d){
    var k=tamamlandiMi(d.id);
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border)">'+
      '<div><div style="font-size:13px;font-weight:500">'+d.rozet.ad+'</div>'+
      '<div style="font-size:12px;color:var(--text2)">'+d.rozet.acik+'</div></div>'+
      (k?'<span class="rozet-kazanildi">Kazanıldı</span>':'<span class="rozet-kilitli">Kilitli</span>')+
    '</div>';
  }).join('');
}

/* ========== ANLATIM YARDIMCI ========== */
function termGuncelle(v){
  v=parseInt(v);
  if(!document.getElementById('term-ic'))return;
  var pct=((v+20)/70)*100;
  document.getElementById('term-ic').style.height=Math.max(4,pct)+'%';
  document.getElementById('term-ic').style.background=v<0?'#378ADD':v<20?'#1D9E75':v<37?'#BA7517':'#E24B4A';
  var m=v<0?v+'°C: Sıfırın altı. Negatif sıcaklık. Buz oluşabilir.':
         v===0?'0°C: Tam donma noktası. Ne pozitif ne negatif.':
         v<20?v+'°C: Pozitif. Sıfırın '+v+' derece üstü.':
         v<37?v+'°C: Güzel hava!':v+'°C: Vücut ısısı seviyesi.';
  if(document.getElementById('term-acik')) document.getElementById('term-acik').textContent=m;
}
</script>
